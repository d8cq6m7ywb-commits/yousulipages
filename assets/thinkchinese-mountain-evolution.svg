<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" rx="12" fill="#1a1a2e"/>
  <text x="400" y="32" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="system-ui" font-weight="600">How 山 (Mountain) Evolved Over 3,000 Years</text>

  <!-- Timeline arrow -->
  <line x1="60" y1="230" x2="740" y2="230" stroke="#334155" stroke-width="2"/>
  <polygon points="736,225 746,230 736,235" fill="#334155"/>

  <!-- Connecting arrows -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#475569"/>
    </marker>
  </defs>
  <path d="M215,230 L255,230" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M415,230 L455,230" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M615,230 L655,230" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ==================== PICTOGRAPH (Drawing) ==================== -->
  <rect x="60" y="120" width="160" height="160" rx="12" fill="#292524" stroke="#78716c" stroke-width="1.5"/>
  <text x="140" y="145" text-anchor="middle" fill="#a8a29e" font-size="11" font-family="system-ui">Original Drawing</text>

  <!-- Actual mountain drawing - jagged peaks -->
  <path d="M90,250 L110,175 L125,210 L140,160 L155,210 L170,180 L195,250"
        fill="none" stroke="#d6d3d1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Little details: ground line and texture -->
  <line x1="85" y1="250" x2="200" y2="250" stroke="#78716c" stroke-width="1"/>
  <!-- Small lines for texture on peaks -->
  <line x1="120" y1="195" x2="125" y2="210" stroke="#a8a29e" stroke-width="1"/>
  <line x1="148" y1="185" x2="145" y2="195" stroke="#a8a29e" stroke-width="1"/>

  <text x="140" y="290" text-anchor="middle" fill="#78716c" font-size="11" font-family="system-ui">~3000 BC</text>
  <text x="140" y="305" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui">What ancient people saw</text>

  <!-- ==================== ORACLE BONE ==================== -->
  <rect x="260" y="120" width="160" height="160" rx="12" fill="#292524" stroke="#92400e" stroke-width="1.5"/>
  <text x="340" y="145" text-anchor="middle" fill="#b45309" font-size="11" font-family="system-ui">Oracle Bone</text>

  <!-- Oracle bone mountain: three irregular vertical peaks, more angular -->
  <path d="M305,248 L315,185 L325,215 L340,170 L355,215 L365,190 L375,248"
        fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base line carved into bone -->
  <path d="M300,248 L380,248" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>

  <text x="340" y="290" text-anchor="middle" fill="#78716c" font-size="11" font-family="system-ui">~1200 BC</text>
  <text x="340" y="305" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui">Scratched on turtle shells</text>

  <!-- ==================== SEAL SCRIPT ==================== -->
  <rect x="460" y="120" width="160" height="160" rx="12" fill="#0f172a" stroke="#1e40af" stroke-width="1.5"/>
  <text x="540" y="145" text-anchor="middle" fill="#3b82f6" font-size="11" font-family="system-ui">Seal Script</text>

  <!-- Seal script: smoother, more stylized three peaks with connecting base -->
  <path d="M510,248 L510,200 M540,248 L540,175 M570,248 L570,205"
        fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Connecting base that hints at the horizontal stroke -->
  <path d="M505,248 L575,248" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Slight curves on peaks -->
  <path d="M510,200 C510,198 512,196 514,196" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <path d="M540,175 C540,173 542,171 544,171" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <path d="M570,205 C570,203 572,201 574,201" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>

  <text x="540" y="290" text-anchor="middle" fill="#78716c" font-size="11" font-family="system-ui">~200 BC</text>
  <text x="540" y="305" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui">Carved in stone seals</text>

  <!-- ==================== MODERN ==================== -->
  <rect x="660" y="120" width="120" height="160" rx="12" fill="#0c0a09" stroke="#dc2626" stroke-width="2"/>
  <text x="720" y="145" text-anchor="middle" fill="#ef4444" font-size="11" font-family="system-ui">Modern</text>

  <!-- The actual modern character -->
  <text x="720" y="235" text-anchor="middle" fill="#fafaf9" font-size="60" font-family="'Noto Sans SC', 'Noto Serif SC', 'SimSun', serif" font-weight="400">山</text>

  <text x="720" y="290" text-anchor="middle" fill="#78716c" font-size="11" font-family="system-ui">Today</text>
  <text x="720" y="305" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui">shan (mountain)</text>

  <!-- Bottom insight -->
  <rect x="100" y="340" width="600" height="70" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="system-ui" font-weight="600">The picture is still there!</text>
  <text x="400" y="385" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">Three vertical strokes = three peaks. The tall center peak flanked by two smaller ones.</text>
  <text x="400" y="400" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui">3,000 years later, you can still see the mountain range on the horizon.</text>

  <!-- Pronunciation -->
  <text x="400" y="438" text-anchor="middle" fill="#64748b" font-size="12" font-family="system-ui">山 shan = mountain | 火山 huoshan = volcano (fire + mountain)</text>
</svg>